<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Altar Assembly</title>
<meta name="description" content="The Altar Assembly creates worship music that rises from the altar. Stream our new album Psalm 91 - The Psalms Project now.">
<meta property="og:title" content="The Altar Assembly | Psalm 91 Out Now">
<meta property="og:description" content="Stream Psalm 91 - The Psalms Project by The Altar Assembly. Out now on all platforms.">
<meta property="og:image" content="https://thealtarassembly.com/og-image.jpg">
<meta property="og:url" content="https://thealtarassembly.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    background: #0a0a12;
    padding: 20px;
  }

  .phone-frame {
    width: 390px;
    min-height: 780px;
    border-radius: 44px;
    border: 8px solid #1a1a1a;
    box-shadow: 0 0 0 2px #333, 0 40px 100px rgba(0,0,0,0.8), inset 0 0 0 1px #444;
    overflow: hidden;
    position: relative;
  }

  .page {
    width: 100%;
    min-height: 100%;
    background:
      radial-gradient(ellipse at 30% 0%, rgba(210,100,20,0.85) 0%, transparent 60%),
      radial-gradient(ellipse at 100% 40%, rgba(20,60,130,0.9) 0%, transparent 55%),
      radial-gradient(ellipse at 0% 80%, rgba(140,60,10,0.6) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(10,30,80,1) 0%, transparent 60%),
      linear-gradient(160deg, #c85a10 0%, #1a3a7a 50%, #0a1530 100%);
    position: relative;
    overflow: hidden;
    padding: 48px 24px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .page::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.35;
    z-index: 0;
  }

  .page::after {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(255,160,50,0.25) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .logo-icon { width: 120px; height: 120px; margin-bottom: 12px; object-fit: contain; filter: brightness(1.1); }

  .brand-title {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 2.3rem;
    color: #ffffff;
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1.1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    margin-bottom: 20px;
  }

  .taglines { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 28px; }
  .tagline { font-size: 0.9rem; color: rgba(255,255,255,0.92); letter-spacing: 0.01em; font-weight: 400; text-align: center; }

  .links { width: 100%; display: flex; flex-direction: column; gap: 11px; }

  .link-btn {
    width: 100%;
    padding: 14px 20px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    text-decoration: none;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.02em;
    color: #ffffff;
    position: relative;
    transition: transform 0.15s ease, filter 0.15s ease;
    background: linear-gradient(135deg, rgba(200,90,20,0.55) 0%, rgba(20,60,140,0.65) 100%);
    border: 1.5px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .link-btn:hover { transform: translateY(-2px); filter: brightness(1.12); }

  /* Primary listen button */
  .link-btn.primary {
    background: linear-gradient(135deg, rgba(220,110,20,0.8) 0%, rgba(30,70,160,0.8) 100%);
    border-color: rgba(255,160,60,0.6);
    font-size: 1.05rem;
    padding: 16px 20px;
  }

  /* Tracklist button */
  .link-btn.tracklist {
    background: linear-gradient(135deg, rgba(26,158,138,0.3) 0%, rgba(20,60,140,0.4) 100%);
    border-color: rgba(26,158,138,0.5);
    font-size: 0.9rem;
  }

  /* Spotify green */
  .link-btn.spotify { background: linear-gradient(135deg, rgba(30,215,96,0.25), rgba(30,215,96,0.08)); border-color: rgba(30,215,96,0.4); }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; width: 100%; }

  .icon { width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .icon svg { width: 100%; height: 100%; }
</style>
</head>
<body>

            </span>

        <!-- Facebook -->

          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none">

              <path d="M15.5 8H13.5C13 8 13 8.4 13 9v2h2.5l-.4 2.5H13V20h-2.5v-6.5H9V11h1.5V9c0-2 1.1-3 3-3h2v2z" fill="white"/>

      </div>
    </div>
  </div>
</div>
